openapi: 3.0.0
info:
  title: API Sistema de Subastas
  version: 2.3.0
  description: |
    API para gestión de subastas online. 

servers:
  - url: http://localhost:3000/api

security:
  - BearerAuth: []

paths:
  # =========================
  # AUTENTICACIÓN Y REGISTRO
  # =========================
  /usuarios/registro-inicial:
    post:
      tags: [Autenticación]
      summary: Registro inicial del usuario
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioRegistroInicial'
      responses:
        "201":
          description: Usuario registrado en estado pendiente
        "400":
          $ref: '#/components/responses/ErrorValidacion'

  /usuarios/{id}/verificar:
    post:
      tags: [Administración]
      summary: Verificar usuario y asignar categoría (Interno)
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [categoria]
              properties:
                categoria: { $ref: '#/components/schemas/CategoriaUsuario' }
      responses:
        "200":
          description: Usuario verificado correctamente
        "401":
          $ref: '#/components/responses/NoAutorizado'
        "403":
          $ref: '#/components/responses/Prohibido'
        "404":
          $ref: '#/components/responses/NoEncontrado'

  /usuarios/activar:
    post:
      tags: [Autenticación]
      summary: Activar cuenta mediante token y password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token: { type: string }
                password: { type: string, format: password }
      responses:
        "200":
          description: Usuario activado correctamente
        "400":
          description: Token inválido o expirado

  /auth/login:
    post:
      tags: [Autenticación]
      summary: Login de usuario
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Login exitoso
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  usuario: { $ref: '#/components/schemas/Usuario' }
        "401":
          $ref: '#/components/responses/NoAutorizado'
    
  /auth/logout:
    post:
      tags: [Autenticación]
      summary: Cerrar sesión del usuario
      description: Invalida el token actual del usuario.
      responses:
        "204":
          description: Sesión cerrada exitosamente (sin contenido)
        "401":
          $ref: '#/components/responses/NoAutorizado'

  # =========================
  # GESTIÓN DE USUARIOS
  # =========================
  /usuarios/{id}:
    get:
      tags: [Usuarios]
      summary: Obtener datos de usuario
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      responses:
        "200":
          description: Datos del usuario
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Usuario' }
        "404":
          $ref: '#/components/responses/NoEncontrado'

  /usuarios/{id}/medios-pago:
    get:
      tags: [Usuarios]
      summary: Listar medios de pago
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      responses:
        "200":
          description: Lista de medios de pago
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/MedioPago' }
        "404":
          $ref: '#/components/responses/NoEncontrado'
    post:
      tags: [Usuarios]
      summary: Agregar nuevo medio de pago
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MedioPago' }
      responses:
        "201":
          description: Medio agregado
        "400":
          $ref: '#/components/responses/ErrorValidacion'

  /usuarios/{id}/subastas-activas:
    get:
      tags: [Usuarios]
      summary: Subastas donde participa el usuario
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      responses:
        "200":
          description: Lista de subastas activas
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Subasta' }
        "404":
          $ref: '#/components/responses/NoEncontrado'

  # =========================
  # ARTÍCULOS
  # =========================
  /usuarios/{id}/articulos:
    get:
      tags: [Artículos]
      summary: Artículos propuestos por el usuario
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      responses:
        "200":
          description: Lista de artículos
        "404":
          $ref: '#/components/responses/NoEncontrado'
    post:
      tags: [Artículos]
      summary: Proponer nuevo artículo
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CrearArticulo' }
      responses:
        "201":
          description: Propuesta recibida
        "400":
          $ref: '#/components/responses/ErrorValidacion'

  # =========================
  # SUBASTAS Y DINÁMICA
  # =========================
  /subastas:
    get:
      tags: [Subastas]
      summary: Listar subastas
      responses:
        "200":
          description: Lista de subastas
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Subasta' }
    post:
      tags: [Subastas]
      summary: Crear subasta (Admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CrearSubasta' }
      responses:
        "201":
          description: Subasta creada
        "403":
          $ref: '#/components/responses/Prohibido'

  /subastas/{id}/agregarArticulo:
    post:
      tags: [Subastas]
      summary: Agregar un artículo a la subasta
      description: Vincula un artículo aprobado a una subasta mediante su ID.
      parameters:
        - $ref: '#/components/parameters/idSubasta'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [articuloId, precioBase]
              properties:
                articuloId:
                  type: integer
                  description: ID del artículo que se desea subastar.
                precioBase:
                  type: number
                  format: float
                  example: 1500.50
                  description: El precio inicial con el que arranca la puja para este artículo.
      responses:
        "201":
          description: Artículo agregado exitosamente a la subasta.
        "400":
          $ref: '#/components/responses/ErrorValidacion'
        "403":
          $ref: '#/components/responses/Prohibido'
        "404":
          description: No se encontró la subasta o el artículo.

  /subastas/{id}/articulos:
    get:
      tags: [Subastas]
      summary: Ver artículos de esta subasta
      parameters:
        - $ref: '#/components/parameters/idSubasta'
      responses:
        "200":
          description: Lista de artículos en subasta
        "404":
          $ref: '#/components/responses/NoEncontrado'
      

  /subastas/{id}/participar:
    post:
      tags: [Subastas]
      summary: Validar acceso a la subasta
      description: Verifica que el usuario cumpla con la categoría y tenga medios de pago validados.
      parameters:
        - $ref: '#/components/parameters/idSubasta'
      responses:
        "200":
          description: Acceso permitido
        "403":
          description: Categoría insuficiente o sin medios de pago validados.

  /subastas/{id}/pujar:
    post:
      tags: [Pujas]
      summary: Realizar oferta
      description: El usuario se identifica mediante el Bearer Token
      parameters:
        - $ref: '#/components/parameters/idSubasta'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NuevaPuja'
      responses:
        "200":
          description: Puja aceptada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Puja' }
        "409":
          description: Puja rechazada (monto bajo, subasta cerrada o medio de pago inválido)

  /subastas/{id}/historial-pujas:
    get:
      tags: [Pujas]
      summary: Historial de la subasta
      parameters:
        - $ref: '#/components/parameters/idSubasta'
      responses:
        "200":
          description: Listado cronológico de pujas
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Puja' }
        "404":
          $ref: '#/components/responses/NoEncontrado'

  /subastas/{id}/resultado:
    get:
      tags: [Subastas]
      summary: Consultar ganador
      parameters:
        - $ref: '#/components/parameters/idSubasta'
      responses:
        "200":
          description: Datos del cierre y ganador
        "404":
          $ref: '#/components/responses/NoEncontrado'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    idUsuario:
      name: id
      in: path
      required: true
      schema: { type: integer }
    idSubasta:
      name: id
      in: path
      required: true
      schema: { type: integer }

  responses:
    ErrorValidacion:
      description: Error en los datos.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NoAutorizado:
      description: No autenticado o token inválido.
    Prohibido:
      description: Sin permisos suficientes.
    NoEncontrado:
      description: No existe el recurso solicitado.

  schemas:
    Error:
      type: object
      properties:
        codigo: { type: string }
        mensaje: { type: string }

    CategoriaUsuario:
      type: string
      enum: [comun, especial, plata, oro, platino]

    UsuarioRegistroInicial:
      type: object
      required: [nombre, apellido, email, documentoFrente, documentoDorso]
      properties:
        nombre: { type: string }
        apellido: { type: string }
        email: { type: string, format: email }
        pais: { type: string }
        domicilio: { type: string }
        documentoFrente: { type: string, format: uri }
        documentoDorso: { type: string, format: uri }

    Usuario:
      type: object
      properties:
        id: { type: integer }
        nombre: { type: string }
        apellido: { type: string }
        email: { type: string }
        categoria: { $ref: '#/components/schemas/CategoriaUsuario' }
        estado: { type: string, enum: [pendiente, aprobado, activo, bloqueado] }

    CrearArticulo:
      type: object
      required: [nombre, descripcion, fotos, declaracionPropiedad]
      properties:
        nombre: { type: string }
        descripcion: { type: string }
        fotos: { type: array, minItems: 6, items: { type: string, format: uri } }
        declaracionPropiedad: { type: boolean }

    Subasta:
      type: object
      properties:
        id: { type: integer }
        titulo: { type: string }
        fechaInicio: { type: string, format: date-time }
        fechaFin: { type: string, format: date-time } # <--- Agregado
        estado: { type: string, enum: [proximamente, abierta, cerrada] }
        moneda: { type: string, enum: [ARS, USD] }

    CrearSubasta:
      type: object
      required: [titulo, fechaInicio, fechaFin, categoriaRequerida, moneda] # <--- fechaFin ahora es requerida
      properties:
        titulo: { type: string }
        fechaInicio: { type: string, format: date-time }
        fechaFin: { type: string, format: date-time } # <--- Agregado
        categoriaRequerida: { $ref: '#/components/schemas/CategoriaUsuario' }
        moneda: { type: string, enum: [ARS, USD] }

    MedioPago:
      type: object
      required: [tipo, detalle]
      properties:
        id: { type: integer }
        tipo: { type: string, enum: [CUENTA_BANCARIA, TARJETA, CHEQUE] }
        detalle: { type: string }
        validado: { type: boolean, default: false }

    NuevaPuja:
      type: object
      required: [monto, medioPagoId]
      properties:
        monto: { type: number, minimum: 0.01 }
        medioPagoId: { type: integer }

    Puja:
      type: object
      properties:
        id: { type: integer }
        monto: { type: number }
        fecha: { type: string, format: date-time }
        usuario:
          type: object
          properties:
            id: { type: integer }
            nombre: { type: string }
        subastaId: { type: integer }