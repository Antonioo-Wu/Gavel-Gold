openapi: 3.0.0
info:
  title: Gavel Gold API
  version: 1.0.0
  description: API del backend de Gavel Gold.

servers:
  - url: http://localhost:3000

security:
  - BearerAuth: []

tags:
  - name: Autenticación
  - name: Usuarios
  - name: Administración
  - name: Artículos
  - name: Subastas

paths:
  /auth/login:
    post:
      tags: [Autenticación]
      summary: Iniciar sesión
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Error401'

  /auth/logout:
    post:
      tags: [Autenticación]
      summary: Cerrar sesión
      responses:
        '204':
          description: Sesión cerrada
        '401':
          $ref: '#/components/responses/Error401'

  /usuarios/registro-inicial:
    post:
      tags: [Autenticación]
      summary: Registrar usuario en estado pendiente
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistroInicialRequest'
      responses:
        '201':
          description: Usuario registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistroInicialResponse'
        '400':
          $ref: '#/components/responses/Error400'

  /usuarios/activar:
    post:
      tags: [Autenticación]
      summary: Activar cuenta con token y contraseña
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivarCuentaRequest'
      responses:
        '200':
          description: Usuario activado
        '400':
          $ref: '#/components/responses/Error400'

  /usuarios/{id}:
    get:
      tags: [Usuarios]
      summary: Obtener usuario por id
      parameters:
        - $ref: '#/components/parameters/UsuarioId'
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '401':
          $ref: '#/components/responses/Error401'
        '404':
          $ref: '#/components/responses/Error404'

  /usuarios/{id}/medios-pago:
    get:
      tags: [Usuarios]
      summary: Listar medios de pago del usuario
      parameters:
        - $ref: '#/components/parameters/UsuarioId'
      responses:
        '200':
          description: Lista de medios de pago
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MedioPago'
        '401':
          $ref: '#/components/responses/Error401'
    post:
      tags: [Usuarios]
      summary: Agregar medio de pago
      parameters:
        - $ref: '#/components/parameters/UsuarioId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MedioPagoCreateRequest'
      responses:
        '201':
          description: Medio de pago agregado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedioPagoCreateResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '404':
          $ref: '#/components/responses/Error404'

  /usuarios/{id}/subastas-activas:
    get:
      tags: [Usuarios]
      summary: Listar subastas activas del usuario
      parameters:
        - $ref: '#/components/parameters/UsuarioId'
      responses:
        '200':
          description: Lista de subastas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subasta'

  /usuarios/{id}/estadisticas:
    get:
      tags: [Usuarios]
      summary: Obtener estadísticas de participación
      parameters:
        - $ref: '#/components/parameters/UsuarioId'
      responses:
        '200':
          description: Estadísticas del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstadisticasUsuario'

  /usuarios/{id}/historial-participacion:
    get:
      tags: [Usuarios]
      summary: Obtener historial de participación
      parameters:
        - $ref: '#/components/parameters/UsuarioId'
      responses:
        '200':
          description: Historial de participación
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistorialParticipacion'

  /usuarios/{id}/articulos:
    get:
      tags: [Artículos]
      summary: Listar artículos del usuario
      parameters:
        - $ref: '#/components/parameters/UsuarioId'
      responses:
        '200':
          description: Lista de artículos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Articulo'
    post:
      tags: [Artículos]
      summary: Proponer un artículo
      parameters:
        - $ref: '#/components/parameters/UsuarioId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearArticuloRequest'
      responses:
        '201':
          description: Artículo propuesto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrearArticuloResponse'
        '400':
          $ref: '#/components/responses/Error400'

  /usuarios/{id}/verificar:
    post:
      tags: [Administración]
      summary: Verificar usuario y asignar categoría
      parameters:
        - $ref: '#/components/parameters/UsuarioId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificarUsuarioRequest'
      responses:
        '200':
          description: Usuario verificado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificarUsuarioResponse'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'

  /admin/articulos/pendientes:
    get:
      tags: [Administración]
      summary: Listar artículos pendientes
      responses:
        '200':
          description: Lista de artículos pendientes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArticuloPendiente'

  /admin/articulos/{id}/aprobar:
    post:
      tags: [Administración]
      summary: Aprobar artículo
      parameters:
        - $ref: '#/components/parameters/ArticuloId'
      responses:
        '200':
          description: Artículo aprobado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccionArticuloResponse'
        '404':
          $ref: '#/components/responses/Error404'

  /admin/articulos/{id}/rechazar:
    post:
      tags: [Administración]
      summary: Rechazar artículo
      parameters:
        - $ref: '#/components/parameters/ArticuloId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RechazarArticuloRequest'
      responses:
        '200':
          description: Artículo rechazado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccionArticuloResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '404':
          $ref: '#/components/responses/Error404'

  /admin/subastas:
    post:
      tags: [Administración]
      summary: Crear subasta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearSubastaRequest'
      responses:
        '201':
          description: Subasta creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrearSubastaResponse'
        '400':
          $ref: '#/components/responses/Error400'

  /admin/subastas/{id}/agregarArticulo:
    post:
      tags: [Administración]
      summary: Agregar artículo a una subasta
      parameters:
        - $ref: '#/components/parameters/SubastaId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgregarArticuloSubastaRequest'
      responses:
        '201':
          description: Artículo agregado a la subasta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgregarArticuloSubastaResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '404':
          $ref: '#/components/responses/Error404'

  /subastas:
    get:
      tags: [Subastas]
      summary: Listar subastas
      security: []
      responses:
        '200':
          description: Lista de subastas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subasta'

  /subastas/{id}/articulos:
    get:
      tags: [Subastas]
      summary: Listar artículos de una subasta
      security: []
      parameters:
        - $ref: '#/components/parameters/SubastaId'
      responses:
        '200':
          description: Lista de artículos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Articulo'
        '404':
          $ref: '#/components/responses/Error404'

  /subastas/{id}/participar:
    post:
      tags: [Subastas]
      summary: Validar acceso para participar
      parameters:
        - $ref: '#/components/parameters/SubastaId'
      responses:
        '200':
          description: Acceso permitido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensajeResponse'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'

  /subastas/{id}/pujar:
    post:
      tags: [Subastas]
      summary: Realizar puja
      parameters:
        - $ref: '#/components/parameters/SubastaId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PujaRequest'
      responses:
        '200':
          description: Puja aceptada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PujaResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'

  /subastas/{id}/historial-pujas:
    get:
      tags: [Subastas]
      summary: Obtener historial de pujas de una subasta
      security: []
      parameters:
        - $ref: '#/components/parameters/SubastaId'
      responses:
        '200':
          description: Historial de pujas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistorialPuja'
        '404':
          $ref: '#/components/responses/Error404'

  /subastas/{id}/resultado:
    get:
      tags: [Subastas]
      summary: Obtener resultado de una subasta
      security: []
      parameters:
        - $ref: '#/components/parameters/SubastaId'
      responses:
        '200':
          description: Resultado de la subasta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultadoSubasta'
        '404':
          $ref: '#/components/responses/Error404'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UsuarioId:
      name: id
      in: path
      required: true
      schema:
        type: string
    ArticuloId:
      name: id
      in: path
      required: true
      schema:
        type: string
    SubastaId:
      name: id
      in: path
      required: true
      schema:
        type: string

  responses:
    Error400:
      description: Solicitud inválida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error401:
      description: No autorizado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error403:
      description: Prohibido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error404:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error409:
      description: Conflicto
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        codigo:
          type: string
        mensaje:
          type: string

    MensajeResponse:
      type: object
      properties:
        mensaje:
          type: string

    CategoriaUsuario:
      type: string
      enum: [comun, especial, plata, oro, platino]

    UsuarioRol:
      type: string
      enum: [usuario, admin]

    EstadoUsuario:
      type: string
      enum: [pendiente, aprobado, activo, bloqueado]

    EstadoArticulo:
      type: string
      enum: [pendiente, aprobado, rechazado, disponible, subastado, retirado]

    EstadoSubasta:
      type: string
      enum: [proximamente, abierta, cerrada]

    MonedaSubasta:
      type: string
      enum: [ARS, USD]

    TipoMedioPago:
      type: string
      enum: [CUENTA_BANCARIA, TARJETA, CHEQUE]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        mensaje:
          type: string
        token:
          type: string
        usuario:
          $ref: '#/components/schemas/LoginUsuario'

    LoginUsuario:
      type: object
      properties:
        id:
          type: string
        nombre:
          type: string
        apellido:
          type: string
        email:
          type: string
        categoria:
          $ref: '#/components/schemas/CategoriaUsuario'
        rol:
          $ref: '#/components/schemas/UsuarioRol'

    RegistroInicialRequest:
      type: object
      required: [nombre, apellido, email, documentoFrente, documentoDorso]
      properties:
        nombre:
          type: string
        apellido:
          type: string
        email:
          type: string
          format: email
        pais:
          type: string
        domicilio:
          type: string
        documentoFrente:
          type: string
        documentoDorso:
          type: string

    RegistroInicialResponse:
      type: object
      properties:
        mensaje:
          type: string
        usuarioId:
          type: string

    ActivarCuentaRequest:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
        password:
          type: string
          format: password

    Usuario:
      type: object
      properties:
        _id:
          type: string
        id:
          type: integer
        nombre:
          type: string
        apellido:
          type: string
        email:
          type: string
          format: email
        pais:
          type: string
        domicilio:
          type: string
        documentoFrente:
          type: string
        documentoDorso:
          type: string
        categoria:
          $ref: '#/components/schemas/CategoriaUsuario'
        estado:
          $ref: '#/components/schemas/EstadoUsuario'
        rol:
          $ref: '#/components/schemas/UsuarioRol'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MedioPago:
      type: object
      properties:
        _id:
          type: string
        id:
          type: integer
        usuarioId:
          type: string
        tipo:
          $ref: '#/components/schemas/TipoMedioPago'
        detalle:
          type: string
        validado:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MedioPagoCreateRequest:
      type: object
      required: [tipo, detalle]
      properties:
        tipo:
          $ref: '#/components/schemas/TipoMedioPago'
        detalle:
          type: string

    MedioPagoCreateResponse:
      type: object
      properties:
        mensaje:
          type: string
        medioPago:
          $ref: '#/components/schemas/MedioPago'

    Articulo:
      type: object
      properties:
        _id:
          type: string
        id:
          type: integer
        nombre:
          type: string
        descripcion:
          type: string
        precioBase:
          type: number
        estado:
          $ref: '#/components/schemas/EstadoArticulo'
        motivoRechazo:
          type: string
          nullable: true
        fechaIngreso:
          type: string
          format: date-time
        fotos:
          type: array
          items:
            type: string
        declaracionPropiedad:
          type: boolean
        propietarioId:
          type: string
        subasta:
          type: string
          nullable: true
        categoria:
          type: string
        disponible:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ArticuloPendiente:
      allOf:
        - $ref: '#/components/schemas/Articulo'

    CrearArticuloRequest:
      type: object
      required: [nombre, fotos, declaracionPropiedad]
      properties:
        nombre:
          type: string
        descripcion:
          type: string
        fotos:
          type: array
          items:
            type: string
        declaracionPropiedad:
          type: boolean

    CrearArticuloResponse:
      type: object
      properties:
        mensaje:
          type: string
        articulo:
          $ref: '#/components/schemas/Articulo'

    VerificarUsuarioRequest:
      type: object
      required: [categoria]
      properties:
        categoria:
          $ref: '#/components/schemas/CategoriaUsuario'

    VerificarUsuarioResponse:
      type: object
      properties:
        mensaje:
          type: string
        usuario:
          $ref: '#/components/schemas/Usuario'
        activationToken:
          type: string

    AccionArticuloResponse:
      type: object
      properties:
        mensaje:
          type: string
        articulo:
          $ref: '#/components/schemas/Articulo'

    RechazarArticuloRequest:
      type: object
      required: [motivo]
      properties:
        motivo:
          type: string

    CrearSubastaRequest:
      type: object
      required: [titulo, fechaInicio, fechaFin, categoriaRequerida]
      properties:
        titulo:
          type: string
        fechaInicio:
          type: string
          format: date-time
        fechaFin:
          type: string
          format: date-time
        categoriaRequerida:
          $ref: '#/components/schemas/CategoriaUsuario'
        moneda:
          $ref: '#/components/schemas/MonedaSubasta'

    Subasta:
      type: object
      properties:
        _id:
          type: string
        id:
          type: integer
        titulo:
          type: string
        fechaInicio:
          type: string
          format: date-time
        fechaFin:
          type: string
          format: date-time
        categoriaRequerida:
          $ref: '#/components/schemas/CategoriaUsuario'
        estado:
          $ref: '#/components/schemas/EstadoSubasta'
        moneda:
          $ref: '#/components/schemas/MonedaSubasta'
        articulos:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CrearSubastaResponse:
      type: object
      properties:
        mensaje:
          type: string
        subasta:
          $ref: '#/components/schemas/Subasta'

    AgregarArticuloSubastaRequest:
      type: object
      required: [articuloId, precioBase]
      properties:
        articuloId:
          type: string
        precioBase:
          type: number
          minimum: 0.01

    AgregarArticuloSubastaResponse:
      type: object
      properties:
        mensaje:
          type: string
        articulo:
          $ref: '#/components/schemas/Articulo'

    PujaRequest:
      type: object
      required: [monto, medioPagoId]
      properties:
        monto:
          type: number
          minimum: 0.01
        medioPagoId:
          type: string

    PujaResponse:
      type: object
      properties:
        mensaje:
          type: string
        puja:
          $ref: '#/components/schemas/PujaConDetalles'

    PujaConDetalles:
      type: object
      properties:
        _id:
          type: string
        subastaId:
          type: string
        usuarioId:
          type: object
          properties:
            _id:
              type: string
            nombre:
              type: string
            apellido:
              type: string
        monto:
          type: number
        medioPagoId:
          type: string
        fecha:
          type: string
          format: date-time

    HistorialPuja:
      type: object
      properties:
        id:
          type: string
        monto:
          type: number
        fecha:
          type: string
          format: date-time
        usuario:
          type: object
          properties:
            id:
              type: string
            nombre:
              type: string
        subastaId:
          type: string

    ResultadoSubasta:
      type: object
      properties:
        subasta:
          type: object
          properties:
            id:
              type: string
            titulo:
              type: string
            estado:
              $ref: '#/components/schemas/EstadoSubasta'
            fechaCierre:
              type: string
              format: date-time
        ganador:
          nullable: true
          type: object
          properties:
            usuarioId:
              type: string
            nombre:
              type: string
            apellido:
              type: string
            montoCierre:
              type: number

    EstadisticasUsuario:
      type: object
      properties:
        asistencias:
          type: integer
        victorias:
          type: integer
        importeOfertadoAcumulado:
          type: number
        importePagadoAcumulado:
          type: number

    HistorialParticipacion:
      type: object
      properties:
        subastaId:
          type: string
        titulo:
          type: string
        fechaCierre:
          type: string
          format: date-time
        miOfertaMax:
          type: number
        ganador:
          type: boolean
        estado:
          $ref: '#/components/schemas/EstadoSubasta'
