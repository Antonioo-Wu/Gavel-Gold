openapi: 3.0.0
info:
  title: API Sistema de Subastas
  version: 2.4.0
  description: API de subastas con articulos, pujas por articulo, polling, pagos y administracion.

servers:
  - url: http://localhost:3000

security:
  - BearerAuth: []

paths:
  /auth/login:
    post:
      tags: [Autenticacion]
      summary: Login de usuario
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        "401":
          $ref: '#/components/responses/NoAutorizado'

  /auth/logout:
    post:
      tags: [Autenticacion]
      summary: Cerrar sesion del usuario
      description: Invalida el token actual del usuario.
      responses:
        "204":
          description: Sesion cerrada exitosamente
        "401":
          $ref: '#/components/responses/NoAutorizado'

  /auth/recuperar-password:
    post:
      tags: [Autenticacion]
      summary: Solicitar recuperacion de contrasena
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200":
          description: Email de recuperacion enviado

  /auth/resetear-password:
    post:
      tags: [Autenticacion]
      summary: Resetear contrasena con token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token: { type: string }
                password: { type: string, format: password }
      responses:
        "200":
          description: Contrasena reseteada correctamente
        "400":
          description: Token invalido o expirado

  /usuarios/registro-inicial:
    post:
      tags: [Autenticacion]
      summary: Registro inicial del usuario
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioRegistroInicial'
      responses:
        "201":
          description: Usuario registrado en estado pendiente
        "400":
          $ref: '#/components/responses/ErrorValidacion'

  /usuarios/activar:
    post:
      tags: [Autenticacion]
      summary: Activar cuenta mediante codigo y password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [codigo, password]
              properties:
                codigo: { type: string }
                password: { type: string, format: password }
      responses:
        "200":
          description: Usuario activado correctamente
        "400":
          description: Codigo invalido o expirado

  /usuarios/{id}:
    get:
      tags: [Usuarios]
      summary: Obtener datos de usuario
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      responses:
        "200":
          description: Datos del usuario
        "404":
          $ref: '#/components/responses/NoEncontrado'

  /usuarios/{id}/medios-pago:
    get:
      tags: [Usuarios]
      summary: Listar medios de pago
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      responses:
        "200":
          description: Lista de medios de pago
    post:
      tags: [Usuarios]
      summary: Agregar nuevo medio de pago
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MedioPagoCreateRequest'
      responses:
        "201":
          description: Medio agregado
        "400":
          $ref: '#/components/responses/ErrorValidacion'

  /usuarios/{id}/subastas-activas:
    get:
      tags: [Usuarios]
      summary: Subastas donde participa el usuario
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      responses:
        "200":
          description: Lista de subastas activas

  /usuarios/{id}/estadisticas:
    get:
      tags: [Usuarios]
      summary: Obtener metricas de participacion del usuario
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      responses:
        "200":
          description: Estadisticas detalladas de participacion

  /usuarios/{id}/historial-participacion:
    get:
      tags: [Usuarios]
      summary: Historial de subastas y resultados del usuario
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      responses:
        "200":
          description: Listado de subastas asistidas y si gano o no

  /usuarios/{id}/articulos:
    get:
      tags: [Articulos]
      summary: Articulos propuestos por el usuario
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      responses:
        "200":
          description: Lista de articulos
        "404":
          $ref: '#/components/responses/NoEncontrado'
    post:
      tags: [Articulos]
      summary: Proponer nuevo articulo
      description: declaracionPropiedad representa la aceptacion tipo checkbox en la UI.
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CrearArticulo'
      responses:
        "201":
          description: Propuesta recibida
        "400":
          $ref: '#/components/responses/ErrorValidacion'

  /usuarios/{id}/articulos/pendientes-aceptacion:
    get:
      tags: [Articulos]
      summary: Articulos pendientes de aceptacion del usuario
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      responses:
        "200":
          description: Lista de articulos pendientes de aceptacion

  /usuarios/{id}/articulos/{articuloId}/aceptar:
    post:
      tags: [Articulos]
      summary: Usuario acepta condiciones del articulo
      description: El usuario acepta el precio base y comision fijados por el admin.
      parameters:
        - $ref: '#/components/parameters/idUsuario'
        - $ref: '#/components/parameters/articuloIdPath'
      responses:
        "200":
          description: Condiciones aceptadas

  /usuarios/{id}/articulos/{articuloId}/rechazar:
    post:
      tags: [Articulos]
      summary: Usuario rechaza condiciones del articulo
      description: El usuario rechaza el precio base y comision fijados por el admin.
      parameters:
        - $ref: '#/components/parameters/idUsuario'
        - $ref: '#/components/parameters/articuloIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                motivo: { type: string }
      responses:
        "200":
          description: Condiciones rechazadas

  /subastas:
    get:
      tags: [Subastas]
      summary: Listar subastas
      responses:
        "200":
          description: Lista de subastas


  /subastas/{id}/articulos:
    get:
      tags: [Subastas]
      summary: Ver articulos de esta subasta
      description: La subasta no embebe la lista de articulos; se consulta como recurso separado.
      parameters:
        - $ref: '#/components/parameters/idSubasta'
      responses:
        "200":
          description: Lista de articulos en subasta
        "404":
          $ref: '#/components/responses/NoEncontrado'

  /subastas/{id}/participar:
    post:
      tags: [Subastas]
      summary: Validar acceso a la subasta
      description: Verifica categoria, medios de pago validados y multas activas.
      parameters:
        - $ref: '#/components/parameters/idSubasta'
      responses:
        "200":
          description: Acceso permitido
        "403":
          description: Categoria insuficiente, sin medios de pago validados o bloqueado por multa.

  /subastas/{subastaId}/articulos/{articuloId}/pujar:
    post:
      tags: [Pujas]
      summary: Realizar oferta sobre un articulo dentro de la subasta
      parameters:
        - $ref: '#/components/parameters/subastaIdPath'
        - $ref: '#/components/parameters/articuloIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NuevaPujaArticulo'
      responses:
        "200":
          description: Puja aceptada
        "400":
          description: Falta confirmacion o datos requeridos
        "403":
          description: Usuario bloqueado por multa activa
        "409":
          description: Puja rechazada por regla minima/maxima, subasta cerrada o medio de pago invalido

  # /articulos/{articuloId}/pujas removed — use /subastas/{subastaId}/articulos/{articuloId}/pujas instead

  /subastas/{subastaId}/articulos/{articuloId}/pujas:
    get:
      tags: [Pujas]
      summary: Historial de pujas por articulo dentro de la subasta
      parameters:
        - $ref: '#/components/parameters/subastaIdPath'
        - $ref: '#/components/parameters/articuloIdPath'
      responses:
        "200":
          description: Listado cronologico de pujas

  /subastas/{subastaId}/articulos/{articuloId}/pujas/estado:
    get:
      tags: [Pujas]
      summary: Estado actual para polling
      parameters:
        - $ref: '#/components/parameters/subastaIdPath'
        - $ref: '#/components/parameters/articuloIdPath'
      responses:
        "200":
          description: Estado actual del articulo

  /subastas/{subastaId}/articulos/{articuloId}/resultado:
    get:
      tags: [Subastas]
      summary: Consultar ganador por articulo
      parameters:
        - $ref: '#/components/parameters/subastaIdPath'
        - $ref: '#/components/parameters/articuloIdPath'
      responses:
        "200":
          description: Datos del cierre y ganador

  /subastas/{subastaId}/articulos/{articuloId}/pago:
    post:
      tags: [Pujas]
      summary: Registrar pago de una compra ganada
      parameters:
        - $ref: '#/components/parameters/subastaIdPath'
        - $ref: '#/components/parameters/articuloIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [modalidadEntrega]
              properties:
                modalidadEntrega:
                  type: string
                  enum: [retiro, envio]
      responses:
        "200":
          description: Pago registrado

  /admin/articulos/pendientes:
    get:
      tags: [Administracion]
      summary: Listar articulos pendientes
      responses:
        "200":
          description: Lista de articulos pendientes

  /admin/articulos/{id}/aprobar:
    post:
      tags: [Administracion]
      summary: Aprobar articulo con precio base y comision
      description: El admin define precioBase y comision, el articulo pasa a pendiente_aceptacion para que el usuario acepte/rechace.
      parameters:
        - $ref: '#/components/parameters/idArticulo'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [precioBase, comision]
              properties:
                precioBase: { type: number, minimum: 0.01 }
                comision: { type: number, minimum: 0 }
      responses:
        "200":
          description: Condiciones enviadas al usuario para aceptacion

  /admin/articulos/{id}/rechazar:
    post:
      tags: [Administracion]
      summary: Rechazar articulo
      parameters:
        - $ref: '#/components/parameters/idArticulo'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [motivo]
              properties:
                motivo: { type: string }
      responses:
        "200":
          description: Articulo rechazado

  /admin/usuarios/{id}/aprobar:
    post:
      tags: [Administracion]
      summary: Aprobar usuario
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      responses:
        "200":
          description: Usuario aprobado

  /admin/usuarios/{id}/rechazar:
    post:
      tags: [Administracion]
      summary: Rechazar usuario
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                motivo: { type: string }
      responses:
        "200":
          description: Usuario rechazado

  /admin/usuarios/{id}/categoria:
    post:
      tags: [Administracion]
      summary: Asignar categoria a usuario
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [categoria]
              properties:
                categoria: { $ref: '#/components/schemas/CategoriaUsuario' }
      responses:
        "200":
          description: Categoria asignada

  /admin/subastas:
    post:
      tags: [Administracion]
      summary: Crear subasta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearSubasta'
      responses:
        "201":
          description: Subasta creada

  /admin/subastas/{id}/agregarArticulo:
    post:
      tags: [Administracion]
      summary: Agregar un articulo a la subasta
      description: Asocia un articulo existente a la subasta y define su precio base inicial.
      parameters:
        - $ref: '#/components/parameters/idSubasta'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [articuloId, precioBase]
              properties:
                articuloId: { type: string }
                precioBase: { type: number }
      responses:
        "201":
          description: Articulo agregado exitosamente a la subasta

  /admin/articulos/{id}/precio-base:
    put:
      tags: [Administracion]
      summary: Definir precio base y puja maxima del articulo
      parameters:
        - $ref: '#/components/parameters/idArticulo'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                precioBase: { type: number }
                pujaMaxima: { type: number }
      responses:
        "200":
          description: Precio actualizado

  /admin/articulos/{id}/comision:
    put:
      tags: [Administracion]
      summary: Definir reglas de puja y comision del articulo
      parameters:
        - $ref: '#/components/parameters/idArticulo'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                comisionPorcentaje: { type: number }
                incrementoMinimo: { type: number }
                porcentajeIncrementoMinimo: { type: number }
                montoMaximoPuja: { type: number }
                requiereConfirmacion: { type: boolean }
      responses:
        "200":
          description: Reglas de comision actualizadas

  /admin/articulos/{id}/cerrar:
    post:
      tags: [Administracion]
      summary: Cerrar un articulo y determinar ganador
      parameters:
        - $ref: '#/components/parameters/idArticulo'
      responses:
        "200":
          description: Articulo cerrado

  /admin/subastas/{id}/cerrar:
    post:
      tags: [Administracion]
      summary: Cerrar una subasta y cerrar sus articulos
      parameters:
        - $ref: '#/components/parameters/idSubasta'
      responses:
        "200":
          description: Subasta cerrada

  /admin/multas:
    post:
      tags: [Administracion]
      summary: Crear multa para un usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [usuarioId, motivo, monto]
              properties:
                usuarioId: { type: string }
                motivo: { type: string }
                monto: { type: number }
                venceEn: { type: string, format: date-time }
      responses:
        "201":
          description: Multa creada

  /admin/multas/{id}/levantar:
    post:
      tags: [Administracion]
      summary: Levantar multa activa
      parameters:
        - $ref: '#/components/parameters/idMulta'
      responses:
        "200":
          description: Multa levantada

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    idUsuario:
      name: id
      in: path
      required: true
      schema: { type: string }
    idSubasta:
      name: id
      in: path
      required: true
      schema: { type: string }
    idArticulo:
      name: id
      in: path
      required: true
      schema: { type: string }
    idMulta:
      name: id
      in: path
      required: true
      schema: { type: string }
    subastaIdPath:
      name: subastaId
      in: path
      required: true
      schema: { type: string }
    articuloIdPath:
      name: articuloId
      in: path
      required: true
      schema: { type: string }

  responses:
    ErrorValidacion:
      description: Error en los datos.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NoAutorizado:
      description: No autenticado o token invalido.
    Prohibido:
      description: Sin permisos suficientes.
    NoEncontrado:
      description: No existe el recurso solicitado.

  schemas:
    Error:
      type: object
      properties:
        codigo: { type: string }
        mensaje: { type: string }

    CategoriaUsuario:
      type: string
      enum: [comun, especial, plata, oro, platino]

    UsuarioRegistroInicial:
      type: object
      required: [nombre, apellido, email, documentoFrente, documentoDorso]
      properties:
        nombre: { type: string }
        apellido: { type: string }
        email: { type: string, format: email }
        pais: { type: string }
        domicilio: { type: string }
        documentoFrente: { type: string, format: uri }
        documentoDorso: { type: string, format: uri }

    Usuario:
      type: object
      properties:
        id: { type: string }
        nombre: { type: string }
        apellido: { type: string }
        email: { type: string }
        categoria: { $ref: '#/components/schemas/CategoriaUsuario' }
        rol: { type: string, enum: [usuario, admin] }
        estado: { type: string, enum: [pendiente, aprobado, activo, bloqueado, rechazado] }

    LoginResponse:
      type: object
      properties:
        mensaje: { type: string }
        token: { type: string }
        usuario:
          $ref: '#/components/schemas/Usuario'

    CrearArticulo:
      type: object
      description: Se envia como multipart/form-data. El campo `fotos` debe repetirse con cada archivo (minimo 6).
      properties:
        nombre: { type: string }
        descripcion: { type: string }
        declaracionPropiedad: { type: boolean }
        fotos:
          type: array
          items: { type: string, format: binary }
          minItems: 6
          description: Archivos de imagen (JPEG, PNG, WebP, GIF). Max 5MB c/u.

    Articulo:
      type: object
      properties:
        id: { type: string }
        nombre: { type: string }
        descripcion: { type: string }
        fotos:
          type: array
          items: { type: string, format: uri }
        estado: { type: string, enum: [pendiente, pendiente_aceptacion, aprobado, rechazado, disponible, subastado, vendido, cerrado, retirado] }
        precioBase: { type: number, nullable: true }
        comision: { type: number, nullable: true }
        pujaActual: { type: number }
        pujaMaxima: { type: number, nullable: true }
        incrementoMinimo: { type: number, nullable: true }
        porcentajeIncrementoMinimo: { type: number, nullable: true }
        montoMaximoPuja: { type: number, nullable: true }
        requiereConfirmacion: { type: boolean }

    Subasta:
      type: object
      description: Representa los datos propios de la subasta. Los articulos asociados se consultan con /subastas/{id}/articulos.
      properties:
        id: { type: string }
        titulo: { type: string }
        fechaInicio: { type: string, format: date-time }
        fechaFin: { type: string, format: date-time }
        estado: { type: string, enum: [proximamente, abierta, cerrada] }
        moneda: { type: string, enum: [ARS, USD] }
        categoriaRequerida: { $ref: '#/components/schemas/CategoriaUsuario' }

    CrearSubasta:
      type: object
      required: [titulo, fechaInicio, fechaFin, categoriaRequerida, moneda]
      properties:
        titulo: { type: string }
        fechaInicio: { type: string, format: date-time }
        fechaFin: { type: string, format: date-time }
        categoriaRequerida: { $ref: '#/components/schemas/CategoriaUsuario' }
        moneda: { type: string, enum: [ARS, USD] }

    MedioPago:
      type: object
      properties:
        id: { type: string }
        tipo: { type: string, enum: [CUENTA_BANCARIA, TARJETA, CHEQUE] }
        detalle: { type: object }
        validado: { type: boolean }

    MedioPagoCreateRequest:
      oneOf:
        - $ref: '#/components/schemas/MedioPagoCuentaBancariaRequest'
        - $ref: '#/components/schemas/MedioPagoTarjetaRequest'
        - $ref: '#/components/schemas/MedioPagoChequeRequest'

    MedioPagoCuentaBancariaRequest:
      type: object
      required: [tipo, detalle]
      properties:
        tipo: { type: string, enum: [CUENTA_BANCARIA] }
        detalle:
          type: object
          required: [cbu]
          properties:
            cbu: { type: string }
            alias: { type: string }
            titular: { type: string }
            cuit: { type: string }

    MedioPagoTarjetaRequest:
      type: object
      required: [tipo, detalle]
      properties:
        tipo: { type: string, enum: [TARJETA] }
        detalle:
          type: object
          required: [titular]
          properties:
            titular: { type: string }
            ultimos4: { type: string }
            vencimiento: { type: string }

    MedioPagoChequeRequest:
      type: object
      required: [tipo, detalle]
      properties:
        tipo: { type: string, enum: [CHEQUE] }
        detalle:
          type: object
          required: [banco]
          properties:
            banco: { type: string }
            numeroCheque: { type: string }
            titular: { type: string }

    NuevaPujaArticulo:
      type: object
      required: [monto, medioPagoId, confirmada]
      properties:
        monto: { type: number, minimum: 0.01 }
        medioPagoId: { type: string }
        confirmada: { type: boolean }

    PujaArticulo:
      type: object
      properties:
        id: { type: string }
        monto: { type: number }
        fecha: { type: string, format: date-time }
        confirmada: { type: boolean }
        usuario:
          type: object
          properties:
            id: { type: string }
            nombre: { type: string }
            apellido: { type: string }
        articuloId: { type: string }
        subastaId: { type: string }

    EstadoPujaArticulo:
      type: object
      properties:
        articulo: { $ref: '#/components/schemas/Articulo' }
        subasta: { $ref: '#/components/schemas/Subasta' }
        pujaActual: { $ref: '#/components/schemas/PujaArticulo' }
        reglas:
          type: object
          properties:
            montoMinimo: { type: number }
            montoMaximo: { type: number, nullable: true }
            requiereConfirmacion: { type: boolean }

    Multa:
      type: object
      properties:
        id: { type: string }
        usuarioId: { type: string }
        motivo: { type: string }
        monto: { type: number }
        activa: { type: boolean }
        venceEn: { type: string, format: date-time, nullable: true }

    Venta:
      type: object
      properties:
        id: { type: string }
        articuloId: { type: string }
        subastaId: { type: string }
