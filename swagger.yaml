openapi: 3.0.0
info:
  title: API Sistema de Subastas
  version: 2.4.0
  description: API de subastas con articulos, pujas por item, polling, pagos y administracion.

servers:
  - url: http://localhost:3000

security:
  - BearerAuth: []

paths:
  /auth/login:
    post:
      tags: [Autenticacion]
      summary: Login de usuario
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Login exitoso
        "401":
          $ref: '#/components/responses/NoAutorizado'

  /auth/logout:
    post:
      tags: [Autenticacion]
      summary: Cerrar sesion del usuario
      description: Invalida el token actual del usuario.
      responses:
        "204":
          description: Sesion cerrada exitosamente
        "401":
          $ref: '#/components/responses/NoAutorizado'

  /usuarios/registro-inicial:
    post:
      tags: [Autenticacion]
      summary: Registro inicial del usuario
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioRegistroInicial'
      responses:
        "201":
          description: Usuario registrado en estado pendiente
        "400":
          $ref: '#/components/responses/ErrorValidacion'

  /usuarios/activar:
    post:
      tags: [Autenticacion]
      summary: Activar cuenta mediante token y password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token: { type: string }
                password: { type: string, format: password }
      responses:
        "200":
          description: Usuario activado correctamente
        "400":
          description: Token invalido o expirado

  /usuarios/{id}:
    get:
      tags: [Usuarios]
      summary: Obtener datos de usuario
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      responses:
        "200":
          description: Datos del usuario
        "404":
          $ref: '#/components/responses/NoEncontrado'

  /usuarios/{id}/medios-pago:
    get:
      tags: [Usuarios]
      summary: Listar medios de pago
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      responses:
        "200":
          description: Lista de medios de pago
    post:
      tags: [Usuarios]
      summary: Agregar nuevo medio de pago
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MedioPagoCreateRequest'
      responses:
        "201":
          description: Medio agregado
        "400":
          $ref: '#/components/responses/ErrorValidacion'

  /usuarios/{id}/subastas-activas:
    get:
      tags: [Usuarios]
      summary: Subastas donde participa el usuario
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      responses:
        "200":
          description: Lista de subastas activas

  /usuarios/{id}/estadisticas:
    get:
      tags: [Usuarios]
      summary: Obtener metricas de participacion del usuario
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      responses:
        "200":
          description: Estadisticas detalladas de participacion

  /usuarios/{id}/historial-participacion:
    get:
      tags: [Usuarios]
      summary: Historial de subastas y resultados del usuario
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      responses:
        "200":
          description: Listado de subastas asistidas y si gano o no

  /usuarios/{id}/articulos:
    get:
      tags: [Articulos]
      summary: Articulos propuestos por el usuario
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      responses:
        "200":
          description: Lista de articulos
        "404":
          $ref: '#/components/responses/NoEncontrado'
    post:
      tags: [Articulos]
      summary: Proponer nuevo articulo
      description: declaracionPropiedad representa la aceptacion tipo checkbox en la UI.
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearArticulo'
      responses:
        "201":
          description: Propuesta recibida
        "400":
          $ref: '#/components/responses/ErrorValidacion'

  /subastas:
    get:
      tags: [Subastas]
      summary: Listar subastas
      responses:
        "200":
          description: Lista de subastas
    post:
      tags: [Subastas]
      summary: Crear subasta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearSubasta'
      responses:
        "201":
          description: Subasta creada

  /subastas/{id}/articulos:
    get:
      tags: [Subastas]
      summary: Ver articulos de esta subasta
      parameters:
        - $ref: '#/components/parameters/idSubasta'
      responses:
        "200":
          description: Lista de articulos en subasta
        "404":
          $ref: '#/components/responses/NoEncontrado'

  /subastas/{id}/participar:
    post:
      tags: [Subastas]
      summary: Validar acceso a la subasta
      description: Verifica categoria, medios de pago validados y multas activas.
      parameters:
        - $ref: '#/components/parameters/idSubasta'
      responses:
        "200":
          description: Acceso permitido
        "403":
          description: Categoria insuficiente, sin medios de pago validados o bloqueado por multa.

  /subastas/{subastaId}/items/{itemId}/pujar:
    post:
      tags: [Pujas]
      summary: Realizar oferta sobre un articulo dentro de la subasta
      parameters:
        - $ref: '#/components/parameters/subastaIdPath'
        - $ref: '#/components/parameters/itemIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NuevaPujaItem'
      responses:
        "200":
          description: Puja aceptada
        "400":
          description: Falta confirmacion o datos requeridos
        "403":
          description: Usuario bloqueado por multa activa
        "409":
          description: Puja rechazada por regla minima/maxima, subasta cerrada o medio de pago invalido

  /items/{itemId}/pujas:
    post:
      tags: [Pujas]
      summary: Realizar oferta sobre un item
      parameters:
        - $ref: '#/components/parameters/itemIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NuevaPujaItem'
      responses:
        "200":
          description: Puja aceptada
    get:
      tags: [Pujas]
      summary: Historial de pujas del item
      parameters:
        - $ref: '#/components/parameters/itemIdPath'
      responses:
        "200":
          description: Listado cronologico de pujas

  /subastas/{subastaId}/items/{itemId}/pujas:
    get:
      tags: [Pujas]
      summary: Historial de pujas por item dentro de la subasta
      parameters:
        - $ref: '#/components/parameters/subastaIdPath'
        - $ref: '#/components/parameters/itemIdPath'
      responses:
        "200":
          description: Listado cronologico de pujas

  /subastas/{subastaId}/items/{itemId}/pujas/estado:
    get:
      tags: [Pujas]
      summary: Estado actual para polling
      parameters:
        - $ref: '#/components/parameters/subastaIdPath'
        - $ref: '#/components/parameters/itemIdPath'
      responses:
        "200":
          description: Estado actual del item

  /subastas/{subastaId}/items/{itemId}/resultado:
    get:
      tags: [Subastas]
      summary: Consultar ganador por item
      parameters:
        - $ref: '#/components/parameters/subastaIdPath'
        - $ref: '#/components/parameters/itemIdPath'
      responses:
        "200":
          description: Datos del cierre y ganador

  /subastas/{subastaId}/items/{itemId}/pago:
    post:
      tags: [Pujas]
      summary: Registrar pago de una compra ganada
      parameters:
        - $ref: '#/components/parameters/subastaIdPath'
        - $ref: '#/components/parameters/itemIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [modalidadEntrega]
              properties:
                modalidadEntrega:
                  type: string
                  enum: [retiro, envio]
      responses:
        "200":
          description: Pago registrado

  /admin/articulos/pendientes:
    get:
      tags: [Administracion]
      summary: Listar articulos pendientes
      responses:
        "200":
          description: Lista de articulos pendientes

  /admin/articulos/{id}/aprobar:
    post:
      tags: [Administracion]
      summary: Aprobar articulo
      parameters:
        - $ref: '#/components/parameters/idArticulo'
      responses:
        "200":
          description: Articulo aprobado

  /admin/articulos/{id}/rechazar:
    post:
      tags: [Administracion]
      summary: Rechazar articulo
      parameters:
        - $ref: '#/components/parameters/idArticulo'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [motivo]
              properties:
                motivo: { type: string }
      responses:
        "200":
          description: Articulo rechazado

  /admin/usuarios/{id}/aprobar:
    post:
      tags: [Administracion]
      summary: Aprobar usuario
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      responses:
        "200":
          description: Usuario aprobado

  /admin/usuarios/{id}/rechazar:
    post:
      tags: [Administracion]
      summary: Rechazar usuario
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                motivo: { type: string }
      responses:
        "200":
          description: Usuario rechazado

  /admin/usuarios/{id}/categoria:
    post:
      tags: [Administracion]
      summary: Asignar categoria a usuario
      parameters:
        - $ref: '#/components/parameters/idUsuario'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [categoria]
              properties:
                categoria: { $ref: '#/components/schemas/CategoriaUsuario' }
      responses:
        "200":
          description: Categoria asignada

  /admin/subastas:
    post:
      tags: [Administracion]
      summary: Crear subasta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearSubasta'
      responses:
        "201":
          description: Subasta creada

  /admin/subastas/{id}/agregarArticulo:
    post:
      tags: [Administracion]
      summary: Agregar un articulo a la subasta
      parameters:
        - $ref: '#/components/parameters/idSubasta'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [articuloId, precioBase]
              properties:
                articuloId: { type: string }
                precioBase: { type: number }
      responses:
        "201":
          description: Articulo agregado exitosamente a la subasta

  /admin/articulos/{id}/precio-base:
    put:
      tags: [Administracion]
      summary: Definir precio base y puja maxima del articulo
      parameters:
        - $ref: '#/components/parameters/idArticulo'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                precioBase: { type: number }
                pujaMaxima: { type: number }
      responses:
        "200":
          description: Precio actualizado

  /admin/subastas/{id}/comision:
    put:
      tags: [Administracion]
      summary: Definir reglas de puja y comision de la subasta
      parameters:
        - $ref: '#/components/parameters/idSubasta'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                comisionPorcentaje: { type: number }
                incrementoMinimo: { type: number }
                porcentajeIncrementoMinimo: { type: number }
                montoMaximoPuja: { type: number }
                requiereConfirmacion: { type: boolean }
      responses:
        "200":
          description: Reglas de subasta actualizadas

  /admin/articulos/{id}/cerrar:
    post:
      tags: [Administracion]
      summary: Cerrar un articulo y determinar ganador
      parameters:
        - $ref: '#/components/parameters/idArticulo'
      responses:
        "200":
          description: Articulo cerrado

  /admin/subastas/{id}/cerrar:
    post:
      tags: [Administracion]
      summary: Cerrar una subasta y cerrar sus articulos
      parameters:
        - $ref: '#/components/parameters/idSubasta'
      responses:
        "200":
          description: Subasta cerrada

  /admin/multas:
    post:
      tags: [Administracion]
      summary: Crear multa para un usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [usuarioId, motivo, monto]
              properties:
                usuarioId: { type: string }
                motivo: { type: string }
                monto: { type: number }
                venceEn: { type: string, format: date-time }
      responses:
        "201":
          description: Multa creada

  /admin/multas/{id}/levantar:
    post:
      tags: [Administracion]
      summary: Levantar multa activa
      parameters:
        - $ref: '#/components/parameters/idMulta'
      responses:
        "200":
          description: Multa levantada

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    idUsuario:
      name: id
      in: path
      required: true
      schema: { type: string }
    idSubasta:
      name: id
      in: path
      required: true
      schema: { type: string }
    idArticulo:
      name: id
      in: path
      required: true
      schema: { type: string }
    idMulta:
      name: id
      in: path
      required: true
      schema: { type: string }
    subastaIdPath:
      name: subastaId
      in: path
      required: true
      schema: { type: string }
    itemIdPath:
      name: itemId
      in: path
      required: true
      schema: { type: string }

  responses:
    ErrorValidacion:
      description: Error en los datos.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NoAutorizado:
      description: No autenticado o token invalido.
    Prohibido:
      description: Sin permisos suficientes.
    NoEncontrado:
      description: No existe el recurso solicitado.

  schemas:
    Error:
      type: object
      properties:
        codigo: { type: string }
        mensaje: { type: string }

    CategoriaUsuario:
      type: string
      enum: [comun, especial, plata, oro, platino]

    UsuarioRegistroInicial:
      type: object
      required: [nombre, apellido, email, documentoFrente, documentoDorso]
      properties:
        nombre: { type: string }
        apellido: { type: string }
        email: { type: string, format: email }
        pais: { type: string }
        domicilio: { type: string }
        documentoFrente: { type: string, format: uri }
        documentoDorso: { type: string, format: uri }

    Usuario:
      type: object
      properties:
        id: { type: string }
        nombre: { type: string }
        apellido: { type: string }
        email: { type: string }
        categoria: { $ref: '#/components/schemas/CategoriaUsuario' }
        estado: { type: string, enum: [pendiente, aprobado, activo, bloqueado, rechazado] }

    CrearArticulo:
      type: object
      required: [nombre, descripcion, fotos, declaracionPropiedad]
      properties:
        nombre: { type: string }
        descripcion: { type: string }
        fotos:
          type: array
          minItems: 6
          items: { type: string, format: uri }
        declaracionPropiedad: { type: boolean }

    Articulo:
      type: object
      properties:
        id: { type: string }
        nombre: { type: string }
        descripcion: { type: string }
        fotos:
          type: array
          items: { type: string, format: uri }
        estado: { type: string, enum: [pendiente, aprobado, rechazado, disponible, subastado, vendido, cerrado, retirado] }
        precioBase: { type: number }
        pujaActual: { type: number }
        pujaMaxima: { type: number, nullable: true }
        requiereConfirmacion: { type: boolean }

    Subasta:
      type: object
      properties:
        id: { type: string }
        titulo: { type: string }
        fechaInicio: { type: string, format: date-time }
        fechaFin: { type: string, format: date-time }
        estado: { type: string, enum: [proximamente, abierta, cerrada] }
        moneda: { type: string, enum: [ARS, USD] }
        categoriaRequerida: { $ref: '#/components/schemas/CategoriaUsuario' }
        incrementoMinimo: { type: number }
        porcentajeIncrementoMinimo: { type: number }
        montoMaximoPuja: { type: number, nullable: true }
        requiereConfirmacion: { type: boolean }
        comisionPorcentaje: { type: number }

    CrearSubasta:
      type: object
      required: [titulo, fechaInicio, fechaFin, categoriaRequerida, moneda]
      properties:
        titulo: { type: string }
        fechaInicio: { type: string, format: date-time }
        fechaFin: { type: string, format: date-time }
        categoriaRequerida: { $ref: '#/components/schemas/CategoriaUsuario' }
        moneda: { type: string, enum: [ARS, USD] }

    MedioPago:
      type: object
      properties:
        id: { type: string }
        tipo: { type: string, enum: [CUENTA_BANCARIA, TARJETA, CHEQUE_CERTIFICADO] }
        detalles: { type: object }
        estadoVerificacion: { type: string, enum: [pendiente, verificado, rechazado] }
        validado: { type: boolean }

    MedioPagoCreateRequest:
      oneOf:
        - $ref: '#/components/schemas/MedioPagoCuentaBancariaRequest'
        - $ref: '#/components/schemas/MedioPagoTarjetaRequest'
        - $ref: '#/components/schemas/MedioPagoChequeRequest'

    MedioPagoCuentaBancariaRequest:
      type: object
      required: [tipo, detalles]
      properties:
        tipo: { type: string, enum: [CUENTA_BANCARIA] }
        detalles:
          type: object
          required: [cbu]
          properties:
            cbu: { type: string }
            alias: { type: string }
            titular: { type: string }
            cuit: { type: string }

    MedioPagoTarjetaRequest:
      type: object
      required: [tipo, detalles]
      properties:
        tipo: { type: string, enum: [TARJETA] }
        detalles:
          type: object
          required: [titular]
          properties:
            titular: { type: string }
            ultimos4: { type: string }
            vencimiento: { type: string }

    MedioPagoChequeRequest:
      type: object
      required: [tipo, detalles]
      properties:
        tipo: { type: string, enum: [CHEQUE_CERTIFICADO] }
        detalles:
          type: object
          required: [banco]
          properties:
            banco: { type: string }
            numeroCheque: { type: string }
            titular: { type: string }

    NuevaPujaItem:
      type: object
      required: [monto, medioPagoId, confirmada]
      properties:
        monto: { type: number, minimum: 0.01 }
        medioPagoId: { type: string }
        confirmada: { type: boolean }

    PujaItem:
      type: object
      properties:
        id: { type: string }
        monto: { type: number }
        fecha: { type: string, format: date-time }
        confirmada: { type: boolean }
        usuario:
          type: object
          properties:
            id: { type: string }
            nombre: { type: string }
            apellido: { type: string }
        articuloId: { type: string }
        subastaId: { type: string }

    EstadoPujaItem:
      type: object
      properties:
        articulo: { $ref: '#/components/schemas/Articulo' }
        subasta: { $ref: '#/components/schemas/Subasta' }
        pujaActual: { $ref: '#/components/schemas/PujaItem' }
        reglas:
          type: object
          properties:
            montoMinimo: { type: number }
            montoMaximo: { type: number, nullable: true }
            requiereConfirmacion: { type: boolean }

    Multa:
      type: object
      properties:
        id: { type: string }
        usuarioId: { type: string }
        motivo: { type: string }
        monto: { type: number }
        activa: { type: boolean }
        venceEn: { type: string, format: date-time, nullable: true }

    Venta:
      type: object
      properties:
        id: { type: string }
        articuloId: { type: string }
        subastaId: { type: string }
        ganadorId: { type: string }
        montoFinal: { type: number }
        estadoPago: { type: string, enum: [pendiente, pagado, rechazado] }
        modalidadEntrega: { type: string, enum: [retiro, envio] }
        estadoEntrega: { type: string, enum: [pendiente, preparando, listo, entregado] }

    MetricasUsuario:
      type: object
      properties:
        asistencias: { type: integer }
        victorias: { type: integer }
        importeOfertadoAcumulado: { type: number }
        importePagadoAcumulado: { type: number }

    HistorialParticipacion:
      type: object
      properties:
        subastaId: { type: string }
        titulo: { type: string }
        fechaCierre: { type: string, format: date-time }
        miOfertaMax: { type: number }
        ganador: { type: boolean }
        estado: { type: string }
